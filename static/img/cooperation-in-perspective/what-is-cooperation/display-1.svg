<svg width="900" height="440" viewBox="0 0 900 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Estimated relative division of cooperative time</title>
  <desc id="desc">A blue-styled pie chart with a full-width blue banner and left-aligned white title block, showing mutual accommodation at 15 percent, active support at 15 percent, shared coordination at 45 percent, and norm-sustaining cooperation at 25 percent.</desc>

  <rect width="900" height="440" fill="#FFFFFF"/>
  <rect x="0" y="0" width="900" height="100" fill="#0F3368"/>
  <foreignObject x="0" y="0" width="900" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml" style="box-sizing:border-box;width:100%;height:100%;padding:20px 45px 20px 45px;display:flex;flex-direction:column;justify-content:flex-start;gap:12px;color:#ffffff;font-family:'IBM Plex Sans','Avenir Next','Segoe UI',sans-serif;">
      <div style="font-size:20px;font-weight:700;line-height:1.3;">Estimated Relative Division of Cooperative Time</div>
      <div style="font-size:14px;font-weight:400;line-height:1.4;">Modern adult populations in OECD-like time-use-survey settings</div>
    </div>
  </foreignObject>

  <circle cx="228" cy="260" r="130" fill="#EAF2FB" stroke="#D6E4F5" stroke-width="2"/>
  <path d="M228 260 L228 130 A130 130 0 0 1 351.634 217.023 Z" fill="#78AAE6"/>
  <path d="M228 260 L351.634 217.023 A130 130 0 0 1 304.435 365.337 Z" fill="#5F93D3"/>
  <path d="M228 260 L304.435 365.337 A130 130 0 0 1 98 260 Z" fill="#0F3368"/>
  <path d="M228 260 L98 260 A130 130 0 0 1 228 130 Z" fill="#1C4B8F"/>
  <circle cx="228" cy="260" r="3.5" fill="#0F3368"/>

  <rect x="392" y="146" width="492" height="46" fill="#0F3368"/>
  <text x="420" y="175" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Form of broad cooperation</text>
  <text x="853" y="175" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Share</text>

  <rect x="392" y="192" width="492" height="52" fill="#FFFFFF" stroke="#D6E4F5"/>
  <rect x="392" y="244" width="492" height="52" fill="#EAF2FB" stroke="#D6E4F5"/>
  <rect x="392" y="296" width="492" height="52" fill="#FFFFFF" stroke="#D6E4F5"/>
  <rect x="392" y="348" width="492" height="52" fill="#EAF2FB" stroke="#D6E4F5"/>

  <rect x="418" y="208" width="16" height="16" fill="#78AAE6"/>
  <rect x="418" y="260" width="16" height="16" fill="#5F93D3"/>
  <rect x="418" y="312" width="16" height="16" fill="#0F3368"/>
  <rect x="418" y="364" width="16" height="16" fill="#1C4B8F"/>

  <text x="448" y="222" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1F2D3D">Mutual accommodation</text>
  <text x="448" y="274" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1F2D3D">Active support</text>
  <text x="448" y="326" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1F2D3D">Shared coordination</text>
  <text x="448" y="378" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1F2D3D">Norm-sustaining cooperation</text>

  <text x="853" y="222" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F3368">15%</text>
  <text x="853" y="274" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F3368">15%</text>
  <text x="853" y="326" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F3368">45%</text>
  <text x="853" y="378" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F3368">25%</text>

  <text x="16" y="427" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1F2D3D">Provisional empirical working estimate inferred from time-use and social-interaction data.</text>
</svg>
