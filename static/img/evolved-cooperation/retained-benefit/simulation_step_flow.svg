<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="2064" viewBox="0 0 1320 2064" role="img" aria-labelledby="title desc">
  <title id="title">Retained Benefit simulation step flowchart</title>
  <desc id="desc">A blue publication-style flowchart showing one retained-benefit simulation step: start from the current lattice, compute cooperative output, split it into open and retained shares, distribute benefits, compute fitness, choose local parents by fitness, copy lineage and cooperation trait with optional mutation, replace the lattice synchronously, then recompute statistics for the next step.</desc>
  <style>
    .canvas { fill: #ffffff; }
    .header { fill: #0f3368; }
    .headerTitle {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 30px;
      font-weight: 700;
      fill: #ffffff;
    }
    .headerSubtitle {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 400;
      fill: #ffffff;
    }
    .panelWhite { fill: #eaf2fb; stroke: #d6e4f5; stroke-width: 3; }
    .panelBlue { fill: #eaf2fb; stroke: #d6e4f5; stroke-width: 3; }
    .panelStripe { fill: #eaf2fb; stroke: #d6e4f5; stroke-width: 3; }
    .accent { fill: #0f3368; }
    .stepBadge { fill: #1c4b8f; }
    .badgeText {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 700;
      fill: #ffffff;
    }
    .stepTitle {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 700;
      fill: #0f3368;
    }
    .bodyText {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 400;
      fill: #1f2d3d;
    }
    .formulaText {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 700;
      fill: #1c4b8f;
    }
    .formulaSub { font-size: 72%; baseline-shift: sub; }
    .formulaSup { font-size: 68%; baseline-shift: super; }
    .smallText {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 16px;
      font-weight: 400;
      fill: #415a77;
    }
    .noteBox { fill: #eaf2fb; stroke: #d6e4f5; stroke-width: 2; }
    .noteTitle {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 16px;
      font-weight: 700;
      fill: #0f3368;
    }
    .noteText {
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 400;
      fill: #1f2d3d;
    }
    .arrow { stroke: #1c4b8f; stroke-width: 5; fill: none; stroke-linecap: square; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1c4b8f"/>
    </marker>
  </defs>

  <rect class="canvas" x="0" y="0" width="1320" height="2064"/>
  <rect class="header" x="0" y="0" width="1320" height="150"/>
  <text class="headerTitle" x="70" y="58">Retained Benefit Simulation Step</text>
  <text class="headerSubtitle" x="70" y="96">One synchronous lattice update from step t to step t + 1 under the retained-benefit routing rule.</text>

  <rect class="panelBlue" x="180" y="200" width="980" height="116"/>
  <rect class="accent" x="180" y="200" width="18" height="116"/>
  <rect class="stepBadge" x="220" y="228" width="56" height="56"/>
  <text class="badgeText" x="248" y="264" text-anchor="middle">1</text>
  <text class="stepTitle" x="308" y="252">Start from the current lattice state</text>
  <text class="bodyText" x="308" y="286">Each occupied site stores one cooperation trait h and one inherited lineage label.</text>

  <path class="arrow" d="M 670 316 L 670 370" marker-end="url(#arrowhead)"/>

  <rect class="panelWhite" x="180" y="388" width="980" height="128"/>
  <rect class="accent" x="180" y="388" width="18" height="128"/>
  <rect class="stepBadge" x="220" y="424" width="56" height="56"/>
  <text class="badgeText" x="248" y="460" text-anchor="middle">2</text>
  <text class="stepTitle" x="308" y="442">Compute gross cooperative output for every producer site</text>
  <text class="formulaText" x="308" y="476">B<tspan class="formulaSub">i</tspan> = b × h<tspan class="formulaSub">i</tspan></text>
  <text class="smallText" x="308" y="504">Higher h increases value production and also increases the private cost charged later in the same step.</text>

  <path class="arrow" d="M 670 516 L 670 570" marker-end="url(#arrowhead)"/>

  <rect class="panelStripe" x="180" y="588" width="980" height="154"/>
  <rect class="accent" x="180" y="588" width="18" height="154"/>
  <rect class="stepBadge" x="220" y="626" width="56" height="56"/>
  <text class="badgeText" x="248" y="662" text-anchor="middle">3</text>
  <text class="stepTitle" x="308" y="644">Split each producer's output into open and retained shares</text>
  <text class="formulaText" x="308" y="680">B<tspan class="formulaSub">i</tspan><tspan class="formulaSup">retained</tspan> = r × B<tspan class="formulaSub">i</tspan></text>
  <text class="formulaText" x="308" y="710">B<tspan class="formulaSub">i</tspan><tspan class="formulaSup">open</tspan> = (1 − r) × B<tspan class="formulaSub">i</tspan></text>
  <text class="smallText" x="308" y="734">Open benefit can leak across the full neighborhood. Retained benefit is protected by lineage matching.</text>

  <path class="arrow" d="M 670 742 L 670 796" marker-end="url(#arrowhead)"/>

  <rect class="panelBlue" x="180" y="814" width="980" height="186"/>
  <rect class="accent" x="180" y="814" width="18" height="186"/>
  <rect class="stepBadge" x="220" y="852" width="56" height="56"/>
  <text class="badgeText" x="248" y="888" text-anchor="middle">4</text>
  <text class="stepTitle" x="308" y="870">Accumulate neighborhood receipts</text>
  <text class="bodyText" x="308" y="904">Open share is distributed equally across all sites in the producer's local neighborhood.</text>
  <text class="bodyText" x="308" y="938">Retained share is distributed only to same-lineage recipients in that same neighborhood.</text>
  <text class="smallText" x="308" y="972">This pass visits every producer site and sums what each destination site receives.</text>

  <rect class="noteBox" x="30" y="864" width="80" height="80"/>
  <text class="noteTitle" x="70" y="888" text-anchor="middle">Loop</text>
  <text class="noteText" x="70" y="908" text-anchor="middle">all</text>
  <text class="noteText" x="70" y="924" text-anchor="middle">producer</text>
  <text class="noteText" x="70" y="940" text-anchor="middle">sites</text>
  <path class="arrow" d="M 110 904 L 180 904" marker-end="url(#arrowhead)"/>

  <path class="arrow" d="M 670 1000 L 670 1054" marker-end="url(#arrowhead)"/>

  <rect class="panelWhite" x="180" y="1072" width="980" height="170"/>
  <rect class="accent" x="180" y="1072" width="18" height="170"/>
  <rect class="stepBadge" x="220" y="1108" width="56" height="56"/>
  <text class="badgeText" x="248" y="1144" text-anchor="middle">5</text>
  <text class="stepTitle" x="308" y="1126">Compute site fitness on the current grid</text>
  <text class="formulaText" x="308" y="1160">W<tspan class="formulaSub">i</tspan> = w<tspan class="formulaSub">0</tspan> + received_open<tspan class="formulaSub">i</tspan></text>
  <text class="formulaText" x="308" y="1190">+ received_retained<tspan class="formulaSub">i</tspan> − c × h<tspan class="formulaSub">i</tspan></text>
  <text class="smallText" x="308" y="1222">Fitness is clamped to a small positive floor before parent selection.</text>

  <path class="arrow" d="M 670 1242 L 670 1296" marker-end="url(#arrowhead)"/>

  <rect class="panelStripe" x="180" y="1314" width="980" height="186"/>
  <rect class="accent" x="180" y="1314" width="18" height="186"/>
  <rect class="stepBadge" x="220" y="1352" width="56" height="56"/>
  <text class="badgeText" x="248" y="1388" text-anchor="middle">6</text>
  <text class="stepTitle" x="308" y="1370">For each destination site, sample one local parent by fitness</text>
  <text class="bodyText" x="308" y="1404">Parent choice is restricted to the destination site's own local neighborhood.</text>
  <text class="bodyText" x="308" y="1438">Selection probability is proportional to the current neighborhood fitness values.</text>
  <text class="smallText" x="308" y="1472">This local replacement lottery is the model's selection step.</text>

  <rect class="noteBox" x="1230" y="1362" width="80" height="80"/>
  <text class="noteTitle" x="1270" y="1386" text-anchor="middle">Loop</text>
  <text class="noteText" x="1270" y="1406" text-anchor="middle">all</text>
  <text class="noteText" x="1270" y="1422" text-anchor="middle">destination</text>
  <text class="noteText" x="1270" y="1438" text-anchor="middle">sites</text>
  <path class="arrow" d="M 1160 1402 L 1230 1402" marker-end="url(#arrowhead)"/>

  <path class="arrow" d="M 670 1500 L 670 1554" marker-end="url(#arrowhead)"/>

  <rect class="panelBlue" x="180" y="1572" width="980" height="214"/>
  <rect class="accent" x="180" y="1572" width="18" height="214"/>
  <rect class="stepBadge" x="220" y="1610" width="56" height="56"/>
  <text class="badgeText" x="248" y="1646" text-anchor="middle">7</text>
  <text class="stepTitle" x="308" y="1628">Copy the chosen parent's lineage and cooperation trait</text>
  <text class="bodyText" x="308" y="1664">Lineage is copied directly. Trait h is copied with optional Gaussian mutation</text>
  <text class="bodyText" x="308" y="1698">and then clipped to [0, 1].</text>
  <text class="smallText" x="308" y="1732">Parent lookup uses the old grid; offspring are written into separate next-step arrays.</text>

  <path class="arrow" d="M 670 1786 L 670 1840" marker-end="url(#arrowhead)"/>

  <rect class="panelWhite" x="180" y="1858" width="980" height="182"/>
  <rect class="accent" x="180" y="1858" width="18" height="182"/>
  <rect class="stepBadge" x="220" y="1896" width="56" height="56"/>
  <text class="badgeText" x="248" y="1932" text-anchor="middle">8</text>
  <text class="stepTitle" x="308" y="1914">Replace the lattice synchronously, recompute fitness, and record history</text>
  <text class="smallText" x="308" y="1950">The new grid becomes step t + 1. The model then records mean cooperation, mean fitness,</text>
  <text class="smallText" x="308" y="1982">assortment, dominant-lineage share, and lineage count.</text>
</svg>
